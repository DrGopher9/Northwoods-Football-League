<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Schedule Editor</title>
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/colors.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/schedule.css">
    <link rel="stylesheet" href="css/scheduleEditor.css">
</head>
<body>
  <nav class="navbar">
    <a href="index.html">Home</a>
    <a href="schedule.html">Schedule</a>
    <a href="stats.html">Stats</a>
  </nav>

  <main class="admin-container">
    <h1 style="text-align:center;">Schedule Editor</h1>

<div class="filters" style="text-align:center;">
  <label>Season:</label>
  <select id="seasonSelect"></select>
  <button id="addSeasonBtn">➕ Add Season</button>
  <button id="deleteSeasonBtn">🗑️ Delete Season</button>
  <label>Type:</label>
  <select id="typeSelect">
    <option value="reg">Regular</option>
    <option value="post">Post Season</option>option>
    <option value="pre">Preseason</option>
  </select>
  <label>Week:</label>
  <select id="weekSelect"></select>
  <button id="loadBtn">Load</button>
  <button id="addGameBtn">Add Game</button>
  <button id="saveAllBtn">Save All</button>
</div>


    <table id="scheduleTable" class="editable-table">
      <thead>
        <tr>
          <th>Week</th>
          <th>Home Team</th>
          <th>Home Score</th>
          <th>Away Team</th>
          <th>Away Score</th>
          <th>Home User</th>
          <th>Away User</th>
          <th>Notes</th>
          <th></th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </main>

  <script type="module" src="scripts/scheduleEditor.js"></script>
</body>
</html>
