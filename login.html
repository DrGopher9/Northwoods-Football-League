<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Sign In</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/colors.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/navbar.css">
  <link rel="stylesheet" href="css/components.css">
  <style>
    .auth-wrap { max-width: 420px; margin: 3rem auto; padding: 1rem; background: var(--surface,#1b1b1b); border:1px solid #2a2a2a; border-radius: 12px;}
    .auth-wrap h2 { margin: 0 0 .75rem 0; }
    .field { display: grid; gap: .4rem; margin-bottom: .8rem; }
    input { background:#101010; border:1px solid #2a2a2a; border-radius:8px; padding:.55rem .7rem; color:#eee; }
    .btn { width:100%; padding:.6rem .8rem; border-radius:8px; border:1px solid #2a2a2a; background:#202020; cursor:pointer; }
    .btn.primary { background: var(--team-accent,#3b82f6); border-color:#2b5fb5; }
    .or { text-align:center; opacity:.8; margin:.7rem 0; }
    .err { color:#ff7676; min-height:1.2rem; margin:.3rem 0 .6rem; }
  </style>
  <script type="module" src="scripts/firebaseConfig.js"></script>
  <script type="module" src="scripts/login.js"></script>
</head>
<body>
   <nav class="navbar">
    <div class="navbar-left">
      <img src="images/logos/NWFLlogo.png" alt="NWFL Logo" class="nwfl-logo" width="40" height="40" decoding="async" />
      <span class="league-title">Northwoods Football League</span>
    </div>
    <input type="checkbox" id="menu-toggle" class="menu-toggle" />
    <label for="menu-toggle" class="hamburger">&#9776;</label>
    <ul class="navbar-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="schedule.html">Schedule</a></li>
      <li class="dropdown">
        <a href="coaches.html">Teams</a>
        <ul class="dropdown-content" id="teamDropdown"></ul>
      </li>
      <li><a href="stats.html">Stats</a></li>
      <li><a href="trade.html">Trade Calc</a></li>
      <li><a href="#">Rules</a></li>
      <li class="dropdown">
        <a href="#">Watch</a>
        <ul class="dropdown-content">
          <li><a href="https://www.youtube.com/@northwoodsfootballleague" target="_blank">YouTube</a></li>
          <li><a href="https://www.twitch.tv/northwoodsfootballleague" target="_blank">Twitch</a></li>
        </ul>
      </li>
      <li class="admin-button"><a href="admin.html">Admin</a></li>
      <li id="authSlot" class="auth-slot"></li>
    </ul>
  </nav>
  <main class="auth-wrap">
    <h2>Admin Sign In</h2>
    <div id="reason" class="err"></div>
    <form id="emailForm">
      <div class="field">
        <label>Email</label>
        <input type="email" id="email" required autocomplete="username">
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="password" required autocomplete="current-password">
      </div>
      <button class="btn primary" type="submit">Sign in</button>
      <div id="emailErr" class="err"></div>
    </form>

    <div class="or">— or —</div>

    <button class="btn" id="googleBtn">Continue with Google</button>
    <div id="googleErr" class="err"></div>
  </main>
</body>
</html>
